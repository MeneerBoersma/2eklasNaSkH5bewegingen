// Avatar-tekenlogica zit in shop-data.js -> renderAvatarHTML()
function AvatarDisplay({ avatar, size=64 }) {
  return <span dangerouslySetInnerHTML={{__html: renderAvatarHTML(avatar, size)}} style={{display:"contents"}}/>;
}

const pick = arr => arr[Math.floor(Math.random()*arr.length)];
const fmt  = n => Number.isInteger(n) ? String(n) : n.toFixed(1).replace(".",",");
const fmtN = n => String(n).replace(".",",");

function makeOptions(correct, wrongs) {
  const unique = [...new Set(wrongs.filter(w=>w!==correct))];
  const all = [correct,...unique.slice(0,3)];
  let pad=1; while(all.length<4) all.push(pad++ + "?");
  for(let i=all.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[all[i],all[j]]=[all[j],all[i]];}
  return {options:all, answer:all.indexOf(correct)};
}

// --- STROBOSCOPISCHE FOTO VISUAL ---------------------------------------------
function StroboFoto({ interval, plaatsen, highlight }) {
  const W=280, H=72;
  const maxX = plaatsen[plaatsen.length-1] + 8;
  const toSvg = x => 14 + (x / maxX) * (W - 30);
  const ticks = Array.from({length: Math.floor(maxX/10)+1}, (_,i) => i*10);
  return (
    <div style={{background:"#0f172a",borderRadius:12,padding:"12px 8px 6px",marginBottom:10,border:"1px solid #1e3a5f"}}>
      <svg width="100%" viewBox={"0 0 " + W + " " + H} style={{display:"block"}}>
        {ticks.map(v=>(
          <g key={v}>
            <line x1={toSvg(v)} y1={50} x2={toSvg(v)} y2={56} stroke="#475569" strokeWidth="1"/>
            <text x={toSvg(v)} y={66} fill="#64748b" fontSize="7" textAnchor="middle">{v}</text>
          </g>
        ))}
        <line x1={14} y1={53} x2={W-16} y2={53} stroke="#334155" strokeWidth="1"/>
        <text x={W-8} y={66} fill="#64748b" fontSize="6">cm</text>
        {plaatsen.map((x,i)=>{
          const isHL = highlight && highlight.includes(i);
          return (
            <g key={i}>
              <circle cx={toSvg(x)} cy={26} r={9}
                fill={isHL ? "rgba(251,191,36,.35)" : "rgba(96,165,250,.18)"}
                stroke={isHL ? "#fbbf24" : "#60a5fa"} strokeWidth="1.5"/>
              <text x={toSvg(x)} y={30} fill={isHL ? "#fbbf24" : "#93c5fd"} fontSize="8" textAnchor="middle" fontWeight="600">
                {String.fromCharCode(65+i)}
              </text>
            </g>
          );
        })}
      </svg>
      <div style={{fontSize:10,color:"#64748b",textAlign:"center",marginTop:2}}>
        flitsinterval: {fmtN(interval)} s &nbsp;&middot;&nbsp; meetlat in cm
      </div>
    </div>
  );
}

// --- (x,t)-DIAGRAM -----------------------------------------------------------
function XTDiagram({ tMax, xMax, tStep, xStep, line, readPoint, showRead }) {
  const W=280, H=160, PL=40, PB=28, PT=10, PR=14;
  const w=W-PL-PR, h=H-PB-PT;
  const mx=t=>PL+(t/tMax)*w;
  const my=x=>PT+h-(x/xMax)*h;
  const tTicks=Array.from({length:Math.floor(tMax/tStep)+1},(_,i)=>i*tStep);
  const xTicks=Array.from({length:Math.floor(xMax/xStep)+1},(_,i)=>i*xStep);
  const pathD = line.map(([t,x],i)=>(i===0?"M":"L")+mx(t).toFixed(1)+","+my(x).toFixed(1)).join(" ");

  return (
    <div style={{display:"flex",justifyContent:"center",margin:"8px 0"}}>
      <svg width="100%" viewBox={"0 0 " + W + " " + H} style={{background:"linear-gradient(135deg,#0f172a,#1e293b)",borderRadius:12,border:"1px solid #334155",display:"block"}}>
        {xTicks.map(x=>(
          <g key={x}>
            <line x1={PL} y1={my(x)} x2={PL+w} y2={my(x)} stroke="#1e3a5f" strokeWidth="1" strokeDasharray="2,4"/>
            <text x={PL-4} y={my(x)+3} fill="#64748b" fontSize="8" textAnchor="end" fontFamily="monospace">{x}</text>
          </g>
        ))}
        {tTicks.map(t=>(
          <g key={t}>
            <line x1={mx(t)} y1={PT} x2={mx(t)} y2={PT+h} stroke="#1e3a5f" strokeWidth="1" strokeDasharray="2,4"/>
            <text x={mx(t)} y={PT+h+16} fill="#64748b" fontSize="8" textAnchor="middle" fontFamily="monospace">{fmtN(t)}</text>
          </g>
        ))}
        <line x1={PL} y1={PT} x2={PL} y2={PT+h} stroke="#475569" strokeWidth="1.5"/>
        <line x1={PL} y1={PT+h} x2={PL+w+4} y2={PT+h} stroke="#475569" strokeWidth="1.5"/>
        <text x={PL-32} y={PT+h/2+3} fill="#94a3b8" fontSize="8" fontFamily="monospace">x (cm)</text>
        <text x={PL+w/2} y={H-3} fill="#94a3b8" fontSize="8" fontFamily="monospace" textAnchor="middle">t (s)</text>
        <path d={pathD} fill="none" stroke="#60a5fa" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
        {showRead && readPoint && (
          <g>
            <line x1={mx(readPoint[0])} y1={my(readPoint[1])} x2={mx(readPoint[0])} y2={PT+h} stroke="#ef4444" strokeWidth="1.2" strokeDasharray="3,3"/>
            <line x1={PL} y1={my(readPoint[1])} x2={mx(readPoint[0])} y2={my(readPoint[1])} stroke="#ef4444" strokeWidth="1.2" strokeDasharray="3,3"/>
            <circle cx={mx(readPoint[0])} cy={my(readPoint[1])} r={4} fill="#ef4444"/>
          </g>
        )}
      </svg>
    </div>
  );
}

// --- TABEL COMPONENT ---------------------------------------------------------
function TabelWeergave({ rijen, fout }) {
  return (
    <div style={{overflowX:"auto",marginBottom:10}}>
      <table style={{width:"100%",borderCollapse:"collapse",fontSize:13,fontFamily:"monospace"}}>
        <thead>
          <tr>
            {["Punt","t (s)","x (cm)"].map(h=>(
              <th key={h} style={{padding:"6px 10px",background:"rgba(96,165,250,.12)",color:"#93c5fd",border:"1px solid rgba(96,165,250,.2)",textAlign:"center"}}>{h}</th>
            ))}
          </tr>
        </thead>
        <tbody>
          {rijen.map(([pt,t,x],i)=>{
            const isFout = fout && t === fout;
            return (
              <tr key={i} style={{background:isFout?"rgba(239,68,68,.12)":i%2===0?"rgba(255,255,255,.02)":"transparent"}}>
                <td style={{padding:"5px 10px",border:"1px solid rgba(255,255,255,.07)",textAlign:"center",color:"#e2e8f0",fontWeight:600}}>{pt}</td>
                <td style={{padding:"5px 10px",border:"1px solid rgba(255,255,255,.07)",textAlign:"center",color:isFout?"#f87171":"#e2e8f0"}}>{t}</td>
                <td style={{padding:"5px 10px",border:"1px solid rgba(255,255,255,.07)",textAlign:"center",color:"#e2e8f0"}}>{x}</td>
              </tr>
            );
          })}
        </tbody>
      </table>
    </div>
  );
}

// --- REKENVRAGEN (willekeurig gegenereerd) ------------------------------------
function generateCalcQuestions() {
  const qs = [];

  // 1. Tijdstip berekenen van een punt
  const sc1 = pick([
    {interval:0.5,  plaatsen:[0,4,8,12,16,20],  vraagIdx:4, pts:"A t/m F"},
    {interval:0.3,  plaatsen:[0,5,10,15,20,25],  vraagIdx:3, pts:"A t/m F"},
    {interval:0.4,  plaatsen:[0,6,12,18,24],     vraagIdx:2, pts:"A t/m E"},
    {interval:1.0,  plaatsen:[0,8,16,24,32],     vraagIdx:3, pts:"A t/m E"},
    {interval:0.25, plaatsen:[0,3,6,9,12,15],    vraagIdx:4, pts:"A t/m F"},
  ]);
  const vraagPt1 = String.fromCharCode(65+sc1.vraagIdx);
  const t1 = sc1.vraagIdx * sc1.interval;
  const {options:o1,answer:a1} = makeOptions(fmtN(t1)+" s",[fmtN(t1+sc1.interval)+" s", fmtN((sc1.vraagIdx-1)*sc1.interval)+" s", fmtN(sc1.interval)+" s"]);
  qs.push({type:"strobo",
    question:"Een stroboscopische foto toont punten "+sc1.pts+". Punt A is gefotografeerd op t = 0 s. De flitsinterval is "+fmtN(sc1.interval)+" s. Op welk tijdstip was het voorwerp bij punt "+vraagPt1+"?",
    stroboData:{interval:sc1.interval, plaatsen:sc1.plaatsen, highlight:[sc1.vraagIdx]},
    given:[["flitsinterval", fmtN(sc1.interval)+" s"],["punt A","t = 0 s"]],
    options:o1, answer:a1,
    explanation:"Punt "+vraagPt1+" is de "+sc1.vraagIdx+"e flits na A: t = "+sc1.vraagIdx+" x "+fmtN(sc1.interval)+" = "+fmtN(t1)+" s"});

  // 2. Tijdsverschil eerste tot laatste opname
  const sc2 = pick([
    {interval:0.15, n:5, context:"Een skater springt van een schans"},
    {interval:0.5,  n:5, context:"Een rollende bal op een helling"},
    {interval:0.2,  n:4, context:"Een springende atleet"},
    {interval:0.25, n:6, context:"Een stuiterende bal"},
  ]);
  const nPts2 = sc2.n+1;
  const t2 = sc2.n * sc2.interval;
  const {options:o2,answer:a2} = makeOptions(fmtN(t2)+" s",[fmtN(t2+sc2.interval)+" s", fmtN(t2-sc2.interval)+" s", fmtN(sc2.interval)+" s"]);
  qs.push({type:"calc",
    question:sc2.context+". Er worden "+nPts2+" momentopnames gemaakt (A t/m "+String.fromCharCode(64+nPts2)+"). De flitsinterval is "+fmtN(sc2.interval)+" s. Hoeveel tijd zit er tussen de eerste en de laatste opname?",
    given:[["aantal tussenpozen",""+sc2.n],["interval",fmtN(sc2.interval)+" s"]],
    options:o2, answer:a2,
    explanation:"Tussen "+nPts2+" punten zijn "+sc2.n+" tussenpozen: totale tijd = "+sc2.n+" x "+fmtN(sc2.interval)+" = "+fmtN(t2)+" s"});

  // 3. Interval berekenen uit totale tijd
  const sc3 = pick([
    {n:4, totaal:0.6, interval:0.15},
    {n:5, totaal:2.5, interval:0.5},
    {n:3, totaal:0.9, interval:0.3},
    {n:6, totaal:1.5, interval:0.25},
    {n:4, totaal:2.0, interval:0.5},
  ]);
  const nPts3 = sc3.n+1;
  const {options:o3,answer:a3} = makeOptions(fmtN(sc3.interval)+" s",[fmtN(sc3.interval*2)+" s", fmtN(sc3.totaal)+" s", fmtN(sc3.interval/2)+" s"]);
  qs.push({type:"calc",
    question:"Een stroboscopische foto heeft "+nPts3+" punten (A t/m "+String.fromCharCode(64+nPts3)+"). Het tijdsverschil tussen de eerste en de laatste opname is "+fmtN(sc3.totaal)+" s. Hoe groot is de flitsinterval?",
    given:[["totale tijd",fmtN(sc3.totaal)+" s"],["aantal tussenpozen",""+sc3.n]],
    options:o3, answer:a3,
    explanation:"Flitsinterval = totale tijd / aantal tussenpozen = "+fmtN(sc3.totaal)+" / "+sc3.n+" = "+fmtN(sc3.interval)+" s"});

  // 4. Afgelegde afstand berekenen uit twee plaatswaarden
  const sc4 = pick([
    {xa:3,  xb:10, pts:"B en C", s:7},
    {xa:0,  xb:16, pts:"A en E", s:16},
    {xa:5,  xb:21, pts:"C en F", s:16},
    {xa:8,  xb:36, pts:"D en G", s:28},
    {xa:10, xb:40, pts:"C en G", s:30},
  ]);
  const {options:o4,answer:a4} = makeOptions(sc4.s+" cm",[sc4.xb+" cm", sc4.xa+" cm", (sc4.s+5)+" cm"]);
  qs.push({type:"calc",
    question:"Op een stroboscopische foto lees je af: "+sc4.pts.split(" en ")[0]+" staat op x = "+sc4.xa+" cm en "+sc4.pts.split(" en ")[1]+" op x = "+sc4.xb+" cm. Bereken de afgelegde afstand.",
    given:[["x\u2081",sc4.xa+" cm"],["x\u2082",sc4.xb+" cm"]],
    options:o4, answer:a4,
    explanation:"s = x\u2082 - x\u2081 = "+sc4.xb+" - "+sc4.xa+" = "+sc4.s+" cm"});

  // 5. Fps -> tijdsinterval
  const sc5 = pick([
    {fps:30, ans:"1/30 s (= 0,033 s)", wrong:["30 s","0,3 s","1/3 s (= 0,33 s)"]},
    {fps:25, ans:"1/25 s (= 0,04 s)",  wrong:["25 s","0,25 s","1/5 s (= 0,2 s)"]},
    {fps:50, ans:"1/50 s (= 0,02 s)",  wrong:["50 s","0,5 s","1/5 s (= 0,2 s)"]},
    {fps:10, ans:"1/10 s (= 0,1 s)",   wrong:["10 s","1 s","1/5 s (= 0,2 s)"]},
  ]);
  const {options:o5,answer:a5} = makeOptions(sc5.ans, sc5.wrong);
  qs.push({type:"calc",
    question:"Een videocamera maakt "+sc5.fps+" beelden per seconde (fps). Hoe lang is de tijd tussen twee opeenvolgende beelden?",
    given:[["beelden per seconde",sc5.fps+" fps"],["tip","interval = 1 / fps"]],
    options:o5, answer:a5,
    explanation:"Interval = 1 / "+sc5.fps+" = "+sc5.ans});

  // 6. Afgelegde afstand uit tabelwaarden
  const sc6 = pick([
    {t1:"0,0",t2:"1,5",x1:0, x2:50,s:50},
    {t1:"0,3",t2:"1,2",x1:10,x2:40,s:30},
    {t1:"0,0",t2:"1,8",x1:0, x2:60,s:60},
    {t1:"0,6",t2:"1,5",x1:20,x2:50,s:30},
    {t1:"0,5",t2:"2,0",x1:3, x2:37,s:34},
  ]);
  const {options:o6,answer:a6} = makeOptions(sc6.s+" cm",[sc6.x2+" cm",(sc6.s+10)+" cm",sc6.x1+" cm"]);
  qs.push({type:"calc",
    question:"Uit een plaats-tijdtabel: op t = "+sc6.t1+" s is x = "+sc6.x1+" cm, op t = "+sc6.t2+" s is x = "+sc6.x2+" cm. Wat is de afgelegde afstand?",
    given:[["x op t = "+sc6.t1+" s",sc6.x1+" cm"],["x op t = "+sc6.t2+" s",sc6.x2+" cm"]],
    options:o6, answer:a6,
    explanation:"s = x\u2082 - x\u2081 = "+sc6.x2+" - "+sc6.x1+" = "+sc6.s+" cm"});

  return qs;
}

        question:"Wat is een (x,t)-diagram?",
        options:["Een tabel met plaatsen en tijden","Een grafiek waarbij de plaats x is uitgezet tegen de tijd t","Een diagram met de snelheid op de y-as","Een cirkeldiagram van de meetpunten"],
        answer:1,
        explanation:"In een (x,t)-diagram staat de tijd t op de horizontale as en de plaats x op de verticale as. Je kunt bij elk tijdstip de bijbehorende plaats aflezen, en omgekeerd."},
      {type:"xtgraph",
        question:"Lees af: op welke plaats bevindt het voorwerp zich op t = 2,3 s?",
        tMax:4, xMax:50, tStep:1, xStep:10,
        line:[[0,0],[1,6],[2,18],[3,32],[4,50]],
        readPoint:[2.3,22],
        options:["18 cm","22 cm","26 cm","30 cm"],
        answer:1,
        explanation:"Bij t = 2,3 s lees je in het diagram x = 22 cm af. De rode stippellijnen tonen het af te lezen punt."},
      {type:"xtgraph",
        question:"Lees af: na hoeveel seconden bevindt het voorwerp zich op x = 30 cm?",
        tMax:4, xMax:40, tStep:1, xStep:10,
        line:[[0,0],[1,10],[2,20],[3,30],[4,40]],
        readPoint:[3,30],
        options:["2,0 s","2,5 s","3,0 s","3,5 s"],
        answer:2,
        explanation:"Bij x = 30 cm lees je op de tijdas t = 3,0 s af."},
      {type:"text",
        question:"Wat betekent een horizontale lijn in een (x,t)-diagram?",
        options:["Het voorwerp beweegt met constante snelheid","Het voorwerp staat stil — de plaats x verandert niet","Het voorwerp versnelt sterk","De meting is niet betrouwbaar"],
        answer:1,
        explanation:"Een horizontale lijn betekent dat x constant is: de plaats verandert niet. Het voorwerp staat stil."},
      {type:"text",
        question:"Hoe bereken je de afgelegde afstand s uit een (x,t)-diagram?",
        options:["Je leest de eindplaats af op de y-as","Je berekent s = x2 - x1 (het verschil tussen twee plaatswaarden)","Je telt alle tijdwaarden op","Je kijkt hoe lang de lijn is op het papier"],
        answer:1,
        explanation:"De afgelegde afstand s = x2 - x1. Je trekt de beginplaats af van de eindplaats op het gewenste tijdsinterval. Het symbool voor afgelegde afstand is s."},
      {type:"xtgraph",
        question:"Lees af: hoeveel centimeter legt het voorwerp af tussen t = 1 s en t = 3 s?",
        tMax:4, xMax:40, tStep:1, xStep:10,
        line:[[0,0],[1,5],[2,15],[3,25],[4,35]],
        readPoint:[2,15],
        options:["5 cm","15 cm","20 cm","25 cm"],
        answer:2,
        explanation:"Op t = 1 s is x = 5 cm; op t = 3 s is x = 25 cm. Afgelegde afstand s = 25 - 5 = 20 cm."},
    ]},
];

const LC=["#f59e0b","#34d399","#60a5fa","#f472b6"];
const LB=["linear-gradient(135deg,#78350f,#92400e)","linear-gradient(135deg,#064e3b,#065f46)","linear-gradient(135deg,#1e3a8a,#1d4ed8)","linear-gradient(135deg,#831843,#9d174d)"];

function App() {
  const [screen,setScreen]   = useState("home");
  const [lvlIdx,setLvlIdx]   = useState(0);
  const [qIdx,setQIdx]       = useState(0);
  const [sel,setSel]         = useState(null);
  const [done,setDone]       = useState(false);
  const [scores,setScores]   = useState([0,0,0,0]);
  const [pts,setPts]         = useState(0);
  const [streak,setStreak]   = useState(0);
  const [maxStr,setMaxStr]   = useState(0);
  const [stars,setStars]     = useState([0,0,0,0]);
  const [shake,setShake]     = useState(false);
  const [genQuestions,setGenQuestions] = useState(null);
  const [avatar,setAvatar]   = useState(DEFAULT_AVATAR);
  const [owned,setOwned]     = useState(DEFAULT_OWNED);
  const [shopCat,setShopCat] = useState("body");
  const [buyFlash,setBuyFlash]= useState(null);

  useEffect(()=>{
    try {
      const raw=localStorage.getItem("beweging_save");
      if(raw){
        const d=JSON.parse(raw);
        if(d.avatar){const av={...DEFAULT_AVATAR,...d.avatar};if(av.face&&!av.badge){av.badge="badge_none";delete av.face;}setAvatar(av);}
        if(d.owned){const ow=d.owned.filter(id=>!id.startsWith("face_"));if(!ow.includes("badge_none"))ow.push("badge_none");setOwned(ow);}
        if(d.pts!==undefined) setPts(d.pts);
        if(d.stars_51) setStars(d.stars_51);
      }
    } catch(e){}
  },[]);

  const save=(av,ow,p,st)=>{
    try{
      const prev=JSON.parse(localStorage.getItem("beweging_save"))||{};
      localStorage.setItem("beweging_save",JSON.stringify({...prev,avatar:av,owned:ow,pts:p,...(st?{stars_51:st}:{})}));
    }catch(e){}
  };

  const addPoints=n=>setPts(p=>{const np=p+n;save(avatar,owned,np);return np;});

  const buyItem=item=>{
    if(owned.includes(item.id)||pts<item.price) return;
    const no=[...owned,item.id],np=pts-item.price;
    setOwned(no);setPts(np);setBuyFlash(item.id);setTimeout(()=>setBuyFlash(null),1200);save(avatar,no,np);
  };
  const equipItem=(cat,item)=>{
    if(!owned.includes(item.id)) return;
    const na={...avatar,[cat]:item.id};setAvatar(na);save(na,owned,pts);
  };

  const level=LEVELS[lvlIdx];
  const questions=(lvlIdx===1&&genQuestions)?genQuestions:level?.questions;
  const q=questions?.[qIdx], total=questions?.length;
  const correct=done&&sel===q?.answer;
  const goHome=()=>{setScreen("home");setSel(null);setDone(false);};

  const handleConfirm=()=>{
    if(sel===null) return;
    setDone(true);
    if(sel===q.answer){
      const ns=streak+1;setStreak(ns);setMaxStr(s=>Math.max(s,ns));
      addPoints(10+(ns>2?5:0));
      setScores(s=>{const n=[...s];n[lvlIdx]++;return n;});
    } else {setStreak(0);setShake(true);setTimeout(()=>setShake(false),600);}
  };

  const handleNext=()=>{
    setSel(null);setDone(false);
    if(qIdx+1<total){setQIdx(i=>i+1);}
    else{
      const pct=scores[lvlIdx]/total;
      const newStar=pct>=.85?3:pct>=.6?2:pct>=.33?1:0;
      setStars(s=>{
        const n=[...s];n[lvlIdx]=newStar;
        save(avatar,owned,pts,n);
        return n;
      });
      setScreen("result");
    }
  };

  const startLevel=i=>{
    setLvlIdx(i);setQIdx(0);setSel(null);setDone(false);
    setScores(s=>{const n=[...s];n[i]=0;return n;});
    if(i===1) setGenQuestions(LEVELS[1].generate());
    setScreen("question");
  };

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#0a0f1e,#111827 60%,#0a0f1e)",fontFamily:"'Segoe UI',system-ui,sans-serif",color:"#f1f5f9",paddingBottom:40}}>
      <style>{`
        @keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
        @keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}60%{transform:translateX(8px)}}
        @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
        .ch:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)!important;transition:all .2s}
        .ob:hover{border-color:#fbbf24!important;background:rgba(251,191,36,.08)!important}
        button{font-family:inherit}
      `}</style>

      <div style={{background:"rgba(255,255,255,.03)",borderBottom:"1px solid rgba(255,255,255,.06)",padding:"9px 16px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <a href="index.html" style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12,textDecoration:"none"}}>&#9889; Home</a>
          {screen!=="home"&&<button onClick={goHome} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,padding:"5px 10px",color:"#94a3b8",cursor:"pointer",fontSize:12}}>&larr; Levels</button>}
          <span style={{fontSize:20}}>&#128248;</span>
          <div><div style={{fontWeight:700,fontSize:13}}>BewegingsGame</div><div style={{fontSize:10,color:"#64748b"}}>2 HAVO &middot; &sect;5.1</div></div>
        </div>
        <div style={{display:"flex",gap:10,alignItems:"center"}}>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#fbbf24"}}>{pts}</div><div style={{fontSize:10,color:"#64748b"}}>punten</div></div>
          <div style={{textAlign:"center"}}><div style={{fontSize:16,fontWeight:700,color:"#f472b6"}}>&#128293;{streak}</div><div style={{fontSize:10,color:"#64748b"}}>streak</div></div>
          <button onClick={()=>setScreen("shop")} style={{background:"none",border:"none",cursor:"pointer",padding:2}}><AvatarDisplay avatar={avatar} size={36}/></button>
        </div>
      </div>

      <div style={{maxWidth:540,margin:"0 auto",padding:"20px 14px"}}>

        {screen==="home"&&(
          <div style={{animation:"fadeIn .4s ease"}}>
            <div style={{textAlign:"center",marginBottom:26}}>
              <div style={{fontSize:44,marginBottom:6}}>&#128248;</div>
              <h1 style={{fontSize:23,fontWeight:800,margin:0,background:"linear-gradient(90deg,#f59e0b,#34d399)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Bewegingen Vastleggen</h1>
              <p style={{color:"#94a3b8",marginTop:8,fontSize:13}}>Kies een level en versla alle opdrachten!</p>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              {LEVELS.map((l,i)=>(
                <div key={i} className="ch" onClick={()=>startLevel(i)} style={{background:LB[i],borderRadius:16,padding:"17px 13px",cursor:"pointer",border:"1px solid "+LC[i]+"40",transition:"all .2s",position:"relative",overflow:"hidden"}}>
                  <div style={{fontSize:28,marginBottom:5}}>{l.icon}</div>
                  <div style={{fontWeight:700,fontSize:14}}>{l.title}</div>
                  <div style={{fontSize:11,color:"rgba(255,255,255,.65)",marginTop:3}}>{l.description}</div>
                  <div style={{marginTop:8,display:"flex",gap:2}}>{[1,2,3].map(s=><span key={s} style={{fontSize:13,opacity:stars[i]>=s?1:.2}}>&#11088;</span>)}</div>
                  <div style={{position:"absolute",top:9,right:9,background:"rgba(0,0,0,.3)",borderRadius:7,padding:"2px 7px",fontSize:10,color:LC[i]}}>{i===1?6:l.questions.length} vr.</div>
                </div>
              ))}
            </div>
            <div style={{marginTop:20,background:"rgba(255,255,255,.03)",borderRadius:12,padding:14,border:"1px solid rgba(255,255,255,.06)"}}>
              <div style={{fontSize:11,color:"#64748b",marginBottom:8}}>&#128218; LEERDOELEN</div>
              {["Beweging vastleggen via video of stroboscopie","Tijdsinterval en meetlat gebruiken bij analyse","Een plaats-tijdtabel lezen en tijdstippen berekenen","Een (x,t)-diagram aflezen","Afgelegde afstand berekenen (s = x2 - x1)"].map((d,i)=>(
                <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",fontSize:13,color:"#cbd5e1"}}><span style={{color:LC[i%4]}}>&#9654;</span> {d}</div>
              ))}
            </div>
            <button onClick={()=>setScreen("shop")} className="ch" style={{marginTop:12,width:"100%",padding:"14px 16px",background:"linear-gradient(135deg,#1e3a5f,#1e293b)",border:"1px solid rgba(96,165,250,.3)",borderRadius:14,cursor:"pointer",display:"flex",alignItems:"center",gap:14,transition:"all .2s"}}>
              <AvatarDisplay avatar={avatar} size={52}/>
              <div style={{textAlign:"left"}}>
                <div style={{fontWeight:700,fontSize:14,color:"#f1f5f9"}}>&#128717; Avatar Winkel</div>
                <div style={{fontSize:12,color:"#94a3b8",marginTop:2}}>Geef je punten uit aan items!</div>
                <div style={{fontSize:12,color:"#fbbf24",marginTop:2}}>&#128176; {pts} punten beschikbaar</div>
              </div>
            </button>
          </div>
        )}

        {screen==="question"&&q&&(
          <div style={{animation:"fadeIn .3s ease"}}>
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7,fontSize:12,color:"#64748b"}}>
                <span>{level.icon} {level.title}</span><span>Vraag {qIdx+1} / {total}</span>
              </div>
              <div style={{height:5,background:"rgba(255,255,255,.06)",borderRadius:999}}>
                <div style={{height:"100%",borderRadius:999,background:"linear-gradient(90deg,"+LC[lvlIdx]+","+LC[(lvlIdx+1)%4]+")",width:((qIdx+(done?1:0))/total*100)+"%",transition:"width .5s ease"}}/>
              </div>
            </div>

            <div style={{background:"rgba(255,255,255,.04)",borderRadius:16,padding:16,border:"1px solid "+LC[lvlIdx]+"30",marginBottom:12,animation:shake?"shake .6s ease":"none"}}>
              <div style={{fontSize:14,fontWeight:600,lineHeight:1.55,marginBottom:10}}>{q.question}</div>

              {q.type==="strobo"&&q.stroboData&&(
                <StroboFoto interval={q.stroboData.interval} plaatsen={q.stroboData.plaatsen} highlight={done?q.stroboData.highlight:null}/>
              )}

              {q.type==="xtgraph"&&(
                <XTDiagram tMax={q.tMax} xMax={q.xMax} tStep={q.tStep} xStep={q.xStep} line={q.line} readPoint={q.readPoint} showRead={done}/>
              )}

              {q.type==="tabel"&&(
                <TabelWeergave rijen={q.tabel} fout={done?q.fout:null}/>
              )}

              {(q.type==="calc"||q.type==="strobo")&&q.given&&(
                <div style={{background:"rgba(251,191,36,.07)",border:"1px solid rgba(251,191,36,.2)",borderRadius:10,padding:12,marginBottom:8}}>
                  <div style={{fontSize:11,color:"#fbbf24",marginBottom:6}}>&#128203; GEGEVEN</div>
                  {q.given.map(([k,v],gi)=><div key={gi} style={{fontSize:13,fontFamily:"monospace",color:"#e2e8f0"}}>{k} = {v}</div>)}
                </div>
              )}
            </div>

            <div style={{display:"grid",gap:9,marginBottom:12}}>
              {q.options.map((opt,i)=>{
                let bg="rgba(255,255,255,.04)",border="rgba(255,255,255,.1)",col="#e2e8f0";
                if(sel===i&&!done){bg="rgba(251,191,36,.12)";border="#fbbf24";}
                if(done){if(i===q.answer){bg="rgba(52,211,153,.12)";border="#34d399";col="#34d399";}else if(i===sel&&i!==q.answer){bg="rgba(239,68,68,.12)";border="#ef4444";col="#ef4444";}}
                return(
                  <button key={i} className={!done?"ob":""} onClick={()=>{if(!done)setSel(i);}}
                    style={{background:bg,border:"1.5px solid "+border,borderRadius:12,padding:"12px 14px",color:col,fontSize:14,fontWeight:500,cursor:done?"default":"pointer",textAlign:"left",transition:"all .2s",display:"flex",alignItems:"center",gap:10}}>
                    <span style={{minWidth:22,height:22,borderRadius:6,background:"rgba(255,255,255,.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>
                      {done?(i===q.answer?"✓":i===sel?"✗":String.fromCharCode(65+i)):String.fromCharCode(65+i)}
                    </span>{opt}
                  </button>
                );
              })}
            </div>

            {done&&(
              <div style={{background:correct?"rgba(52,211,153,.08)":"rgba(239,68,68,.08)",border:"1px solid "+(correct?"#34d399":"#ef4444")+"40",borderRadius:12,padding:14,marginBottom:12,animation:"popIn .3s ease"}}>
                <div style={{fontSize:13,fontWeight:600,color:correct?"#34d399":"#f87171",marginBottom:4}}>
                  {correct?"&#10003; Goed gedaan!":"&#10007; Niet helemaal..."}
                  {correct&&streak>2&&<span style={{marginLeft:8,color:"#fbbf24"}}>&#128293; {streak}x streak! +5</span>}
                </div>
                <div style={{fontSize:13,color:"#cbd5e1",lineHeight:1.6}}>&#128161; {q.explanation}</div>
              </div>
            )}

            {!done?(
              <button onClick={handleConfirm} disabled={sel===null} style={{width:"100%",padding:14,background:sel!==null?"linear-gradient(135deg,"+LC[lvlIdx]+","+LC[(lvlIdx+1)%4]+")":"rgba(255,255,255,.05)",border:"none",borderRadius:12,color:sel!==null?"#0a0f1e":"#475569",fontWeight:700,fontSize:15,cursor:sel!==null?"pointer":"default",transition:"all .2s"}}>
                Controleer &rarr;
              </button>
            ):(
              <button onClick={handleNext} style={{width:"100%",padding:14,background:"linear-gradient(135deg,"+LC[lvlIdx]+","+LC[(lvlIdx+1)%4]+")",border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,fontSize:15,cursor:"pointer"}}>
                {qIdx+1<total?"Volgende vraag \u2192":"Resultaat bekijken \uD83C\uDFC6"}
              </button>
            )}
          </div>
        )}

        {screen==="result"&&(
          <div style={{animation:"fadeIn .4s ease",textAlign:"center"}}>
            <div style={{fontSize:52,marginBottom:6}}>{scores[lvlIdx]===total?"&#127942;":scores[lvlIdx]>=total*.6?"&#127881;":"&#128170;"}</div>
            <h2 style={{fontSize:21,fontWeight:800,margin:"0 0 4px"}}>{level.title} &mdash; Klaar!</h2>
            <div style={{fontSize:14,color:"#94a3b8",marginBottom:20}}>{scores[lvlIdx]} van {total} goed beantwoord</div>
            <div style={{display:"flex",justifyContent:"center",gap:8,marginBottom:20}}>
              {[1,2,3].map(s=><span key={s} style={{fontSize:34,opacity:stars[lvlIdx]>=s?1:.2,animation:stars[lvlIdx]>=s?"popIn .4s ease "+(s*.15)+"s both":"none"}}>&#11088;</span>)}
            </div>
            <div style={{background:"rgba(255,255,255,.04)",borderRadius:12,padding:14,marginBottom:14,border:"1px solid rgba(255,255,255,.06)"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:7}}>
                <span style={{fontSize:13,color:"#94a3b8"}}>Score</span>
                <span style={{fontSize:13,fontWeight:700,color:LC[lvlIdx]}}>{Math.round((scores[lvlIdx]/total)*100)}%</span>
              </div>
              <div style={{height:7,background:"rgba(255,255,255,.06)",borderRadius:999}}>
                <div style={{height:"100%",borderRadius:999,background:"linear-gradient(90deg,"+LC[lvlIdx]+","+LC[(lvlIdx+1)%4]+")",width:(scores[lvlIdx]/total*100)+"%",transition:"width 1s ease"}}/>
              </div>
            </div>
            <div style={{background:"rgba(251,191,36,.06)",borderRadius:12,padding:12,marginBottom:14,border:"1px solid rgba(251,191,36,.15)"}}>
              <div style={{fontSize:13,color:"#fbbf24"}}>&#128293; Langste streak: {maxStr}x &nbsp;|&nbsp; &#127919; Totaal: {pts} punten</div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
              <button onClick={()=>startLevel(lvlIdx)} style={{padding:14,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>&#128260; Opnieuw</button>
              <button onClick={goHome} style={{padding:14,background:"linear-gradient(135deg,"+LC[lvlIdx]+","+LC[(lvlIdx+1)%4]+")",border:"none",borderRadius:12,color:"#0a0f1e",fontWeight:700,cursor:"pointer",fontSize:14}}>&#127968; Levels</button>
            </div>
            <button onClick={()=>setScreen("shop")} style={{width:"100%",padding:13,background:"linear-gradient(135deg,#1e3a5f,#1e293b)",border:"1px solid rgba(96,165,250,.3)",borderRadius:12,color:"#f1f5f9",fontWeight:600,cursor:"pointer",fontSize:14,display:"flex",alignItems:"center",justifyContent:"center",gap:10,marginBottom:10}}>
              <AvatarDisplay avatar={avatar} size={32}/> &#128717; Naar de winkel
            </button>
            {lvlIdx<LEVELS.length-1&&(
              <button onClick={()=>startLevel(lvlIdx+1)} style={{width:"100%",padding:14,background:LB[lvlIdx+1],border:"1px solid "+LC[lvlIdx+1]+"40",borderRadius:12,color:"#f1f5f9",fontWeight:600,cursor:"pointer",fontSize:14}}>
                Volgend level: {LEVELS[lvlIdx+1].icon} {LEVELS[lvlIdx+1].title} &rarr;
              </button>
            )}
          </div>
        )}

        {screen==="shop"&&(
          <div style={{animation:"fadeIn .35s ease"}}>
            <div style={{textAlign:"center",marginBottom:20}}>
              <div style={{display:"flex",justifyContent:"center",marginBottom:10}}><AvatarDisplay avatar={avatar} size={90}/></div>
              <div style={{fontSize:18,fontWeight:800}}>Jouw Avatar</div>
              <div style={{fontSize:13,color:"#94a3b8",marginTop:2}}>&#128176; {pts} punten beschikbaar</div>
            </div>
            <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
              {Object.entries(CAT_LABELS).map(([cat,label])=>(
                <button key={cat} onClick={()=>setShopCat(cat)} style={{flexShrink:0,padding:"7px 13px",borderRadius:20,border:"1.5px solid "+(shopCat===cat?"#60a5fa":"rgba(255,255,255,.1)"),background:shopCat===cat?"rgba(96,165,250,.15)":"rgba(255,255,255,.04)",color:shopCat===cat?"#60a5fa":"#94a3b8",fontWeight:600,fontSize:12,cursor:"pointer",transition:"all .15s"}}>
                  {label}
                </button>
              ))}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
              {SHOP[shopCat].map(item=>{
                const isOwned=owned.includes(item.id),isEquipped=avatar[shopCat]===item.id,canAfford=pts>=item.price,justBought=buyFlash===item.id;
                return(
                  <div key={item.id} onClick={()=>isOwned?equipItem(shopCat,item):buyItem(item)} className="ch"
                    style={{background:isEquipped?"rgba(96,165,250,.15)":justBought?"rgba(52,211,153,.15)":"rgba(255,255,255,.04)",
                      border:"1.5px solid "+(isEquipped?"#60a5fa":justBought?"#34d399":isOwned?"rgba(255,255,255,.18)":"rgba(255,255,255,.08)"),
                      borderRadius:14,padding:"14px 12px",cursor:(!isOwned&&!canAfford)?"not-allowed":"pointer",
                      opacity:(!isOwned&&!canAfford)?.45:1,transition:"all .2s",textAlign:"center",position:"relative"}}>
                    {shopCat==="bg"
                      ?<div style={{width:40,height:40,borderRadius:"50%",background:item.color,margin:"0 auto 8px",border:"2px solid rgba(255,255,255,.15)"}}/>
                      :<div style={{fontSize:34,marginBottom:6,lineHeight:1}}>{item.emoji||"&minus;"}</div>
                    }
                    <div style={{fontWeight:600,fontSize:13,color:"#f1f5f9"}}>{item.name}</div>
                    <div style={{marginTop:5,fontSize:12}}>
                      {isEquipped?<span style={{color:"#60a5fa",fontWeight:700}}>&#10003; Aan</span>
                      :isOwned?<span style={{color:"#34d399",fontSize:11}}>In bezit &mdash; klik om aan te doen</span>
                      :justBought?<span style={{color:"#34d399",fontWeight:700}}>&#10003; Gekocht!</span>
                      :<span style={{color:canAfford?"#fbbf24":"#ef4444",fontWeight:600}}>&#128176; {item.price} punten</span>}
                    </div>
                    {isEquipped&&<div style={{position:"absolute",top:8,right:8,width:10,height:10,borderRadius:"50%",background:"#60a5fa"}}/>}
                  </div>
                );
              })}
            </div>
            <button onClick={goHome} style={{width:"100%",padding:13,background:"rgba(255,255,255,.06)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,color:"#e2e8f0",fontWeight:600,cursor:"pointer",fontSize:14}}>
              &larr; Terug naar levels
            </button>
          </div>
        )}

      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
