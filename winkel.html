<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avatar Winkel · H5 Beweging</title>
  <script src="shop-data.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;padding-bottom:48px;transition:background 0.6s ease}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    .card{transition:transform .2s,box-shadow .2s}
    .card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
    button,a{font-family:inherit}
    .dev-badge{background:rgba(251,191,36,.15);border:1px solid #fbbf24;border-radius:6px;padding:2px 8px;font-size:10px;color:#fbbf24;font-weight:700}
  </style>
</head>
<body>

<!-- HEADER -->
<div style="background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);padding:11px 20px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 10px;color:#94a3b8;font-size:12px;text-decoration:none">← Overzicht</a>
    <span style="font-size:18px">🛍️</span>
    <div>
      <div style="font-weight:700;font-size:13px;display:flex;align-items:center;gap:7px">
        Avatar Winkel
        <span id="dev-badge" style="display:none" class="dev-badge">🛠️ DEV</span>
      </div>
      <div style="font-size:10px;color:#64748b">H5 · Beweging</div>
    </div>
  </div>
  <div style="text-align:right">
    <div id="hdr-pts" style="font-size:16px;font-weight:700;color:#fbbf24">0</div>
    <div id="hdr-stars" style="font-size:11px;color:#94a3b8;margin-top:1px">⭐ 0 sterren</div>
  </div>
</div>

<!-- CONTENT -->
<div style="max-width:540px;margin:0 auto;padding:20px 14px;animation:fadeIn .4s ease">

  <!-- Avatar preview -->
  <div style="text-align:center;margin-bottom:22px">
    <div style="display:flex;justify-content:center;margin-bottom:10px">
      <div id="avatar-preview"></div>
    </div>
    <div style="font-size:18px;font-weight:800">Jouw Avatar</div>
    <div id="pts-label"  style="font-size:13px;color:#94a3b8;margin-top:3px">💰 0 punten beschikbaar</div>
    <div id="star-label" style="font-size:12px;color:#64748b;margin-top:2px">⭐ 0 van 0 sterren verzameld</div>
  </div>

  <!-- Category tabs -->
  <div id="tabs" style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px"></div>

  <!-- Items grid -->
  <div id="items-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px"></div>

  <a href="index.html" style="display:block;width:100%;padding:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#e2e8f0;font-weight:600;font-size:14px;text-align:center;text-decoration:none">← Terug naar overzicht</a>

  <div style="text-align:center;margin-top:20px;font-size:10px;color:rgba(255,255,255,.05);user-select:none">· · ·</div>
</div>

<script>
var save = {}, currentCat = "body";

// Totaal sterren optellen over alle paragrafen
function getTotalStars() {
  var total = 0;
  ["51","52","53","54"].forEach(function(k) {
    var arr = save["stars_" + k];
    if (Array.isArray(arr)) arr.forEach(function(s) { total += (s || 0); });
  });
  return total;
}

// Max mogelijke sterren
function getMaxStars() {
  var max = 0;
  ["51","52","53","54"].forEach(function(k) {
    var arr = save["stars_" + k];
    if (Array.isArray(arr)) max += arr.length * 3;
  });
  return max || 48; // fallback: 4 para × 4 levels × 3 sterren
}

function loadSave() {
  try { save = JSON.parse(localStorage.getItem("beweging_save")) || {}; } catch(e) { save = {}; }
  if (!save.avatar) save.avatar = Object.assign({}, DEFAULT_AVATAR);
  if (!save.owned)  save.owned  = DEFAULT_OWNED.slice();
  if (typeof save.pts !== "number") save.pts = 0;
  // Migratie: zorg dat appbg bestaat
  if (!save.avatar.appbg) save.avatar.appbg = "appbg_default";
  if (!save.owned.includes("appbg_default")) save.owned.push("appbg_default");
}

function persist() {
  try { localStorage.setItem("beweging_save", JSON.stringify(save)); } catch(e) {}
}

function renderHeader() {
  var stars = getTotalStars();
  var maxSt = getMaxStars();
  document.getElementById("hdr-pts").textContent  = save.pts;
  document.getElementById("hdr-stars").textContent = "⭐ " + stars + " / " + maxSt + " sterren";
  document.getElementById("pts-label").textContent  = "💰 " + save.pts + " punten beschikbaar";
  document.getElementById("star-label").textContent = "⭐ " + stars + " van " + maxSt + " sterren verzameld";
  document.getElementById("avatar-preview").innerHTML = renderAvatarHTML(save.avatar, 90);
  document.getElementById("dev-badge").style.display = save._devMode ? "inline" : "none";
}

function renderTabs() {
  document.getElementById("tabs").innerHTML = Object.keys(CAT_LABELS).map(function(cat) {
    var label  = CAT_LABELS[cat];
    var active = currentCat === cat;
    return '<button onclick="switchCat(\'' + cat + '\')" style="flex-shrink:0;padding:7px 13px;border-radius:20px;border:1.5px solid '
      + (active ? "#60a5fa" : "rgba(255,255,255,.1)")
      + ';background:' + (active ? "rgba(96,165,250,.15)" : "rgba(255,255,255,.04)")
      + ';color:' + (active ? "#60a5fa" : "#94a3b8")
      + ';font-weight:600;font-size:12px;cursor:pointer">' + label + '</button>';
  }).join("");
}

function renderItems() {
  var totalStars = getTotalStars();
  document.getElementById("items-grid").innerHTML = SHOP[currentCat].map(function(item) {
    var isOwned    = save.owned.indexOf(item.id) !== -1;
    var isEquipped = save.avatar[currentCat] === item.id;
    var canAfford  = save.pts >= item.price;
    var starLocked = !isOwned && item.starReq && totalStars < item.starReq;
    var missing    = starLocked ? (item.starReq - totalStars) : 0;

    var borderColor = isEquipped ? "#60a5fa" : isOwned ? "rgba(255,255,255,.18)" : starLocked ? "rgba(251,191,36,.3)" : "rgba(255,255,255,.08)";
    var bgColor     = isEquipped ? "rgba(96,165,250,.15)" : starLocked ? "rgba(251,191,36,.04)" : "rgba(255,255,255,.04)";
    var opacity     = (!isOwned && !canAfford && !starLocked) ? "0.4" : "1";
    var cursor      = (!isOwned && (!canAfford || starLocked)) ? "not-allowed" : "pointer";

    // Visueel: appbg toont gradient bar, bg toont cirkel, rest toont emoji
    var visual;
    if (currentCat === "appbg") {
      var css = item.css || item.color || "#0a0f1e";
      visual = '<div style="width:84px;height:30px;border-radius:7px;background:' + css + ';margin:0 auto 8px;border:1px solid rgba(255,255,255,.15)"></div>';
    } else if (currentCat === "bg") {
      visual = '<div style="width:40px;height:40px;border-radius:50%;background:' + item.color + ';margin:0 auto 8px;border:2px solid rgba(255,255,255,.15)"></div>';
    } else {
      // emoji — gebruik spatie als er geen emoji is (voorkomt &minus; / lege ruimte bugs)
      var em = item.emoji || " ";
      visual = '<div style="font-size:34px;margin-bottom:6px;line-height:1">' + em + '</div>';
    }

    var statusHtml;
    if (isEquipped) {
      statusHtml = '<span style="color:#60a5fa;font-weight:700">✓ Actief</span>';
    } else if (isOwned) {
      statusHtml = '<span style="color:#34d399;font-size:11px">In bezit — klik om aan</span>';
    } else if (starLocked) {
      statusHtml = '<span style="color:#fbbf24;font-size:11px">🔒 Nog ' + missing + ' &#11088; nodig</span>';
    } else {
      statusHtml = '<span style="color:' + (canAfford ? "#fbbf24" : "#ef4444") + ';font-weight:600">💰 ' + item.price + ' pts</span>';
    }

    var starBadge = (item.starReq && !isOwned)
      ? '<div style="position:absolute;top:7px;left:7px;background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.35);border-radius:9px;padding:2px 6px;font-size:9px;color:#fbbf24;font-weight:700">&#11088; ' + item.starReq + '</div>'
      : '';
    var equippedDot = isEquipped
      ? '<div style="position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#60a5fa"></div>'
      : '';

    return '<div class="card" onclick="handleItem(\'' + currentCat + '\',\'' + item.id + '\')" '
      + 'style="background:' + bgColor + ';border:1.5px solid ' + borderColor + ';border-radius:14px;padding:14px 12px;'
      + 'cursor:' + cursor + ';opacity:' + opacity + ';text-align:center;position:relative">'
      + equippedDot + starBadge + visual
      + '<div style="font-weight:600;font-size:13px;color:#f1f5f9">' + item.name + '</div>'
      + '<div style="margin-top:5px;font-size:12px">' + statusHtml + '</div>'
      + '</div>';
  }).join("");
}

function handleItem(cat, id) {
  var item = null;
  SHOP[cat].forEach(function(x) { if (x.id === id) item = x; });
  if (!item) return;
  var totalStars = getTotalStars();
  if (!save.owned.includes(id) && item.starReq && totalStars < item.starReq) return;

  if (save.owned.indexOf(id) !== -1) {
    save.avatar[cat] = id;
  } else if (save.pts >= item.price) {
    save.owned.push(id);
    save.pts -= item.price;
    save.avatar[cat] = id;
  } else {
    return;
  }
  persist();
  if (cat === "appbg") applyAppBackground(save.avatar);
  renderHeader();
  renderItems();
}

function switchCat(cat) { currentCat = cat; renderTabs(); renderItems(); }

loadSave();
applyAppBackground(save.avatar);
renderHeader();
renderTabs();
renderItems();
</script>
</body>
</html>
