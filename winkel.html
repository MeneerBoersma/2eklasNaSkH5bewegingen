<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Avatar Winkel · H5 Beweging</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:linear-gradient(160deg,#0a0f1e,#111827 60%,#0a0f1e);min-height:100vh;color:#f1f5f9;font-family:'Segoe UI',system-ui,sans-serif;padding-bottom:48px}
    @keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
    @keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
    .card{transition:transform .2s,box-shadow .2s}
    .card:hover{transform:translateY(-3px);box-shadow:0 12px 40px rgba(0,0,0,.5)}
    button,a{font-family:inherit}
  </style>
</head>
<body>

<div style="background:rgba(255,255,255,.03);border-bottom:1px solid rgba(255,255,255,.06);padding:11px 20px;display:flex;align-items:center;justify-content:space-between">
  <div style="display:flex;align-items:center;gap:10px">
    <a href="index.html" style="background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:5px 10px;color:#94a3b8;font-size:12px;text-decoration:none">← Overzicht</a>
    <span style="font-size:18px">🛍️</span>
    <div><div style="font-weight:700;font-size:13px">Avatar Winkel</div><div style="font-size:10px;color:#64748b">H5 · Beweging</div></div>
  </div>
  <div style="text-align:center"><div id="hdr-pts" style="font-size:16px;font-weight:700;color:#fbbf24">0</div><div style="font-size:10px;color:#64748b">punten</div></div>
</div>

<div style="max-width:540px;margin:0 auto;padding:20px 14px;animation:fadeIn .4s ease">

  <!-- Avatar preview -->
  <div style="text-align:center;margin-bottom:22px">
    <div style="display:flex;justify-content:center;margin-bottom:10px">
      <div id="avatar-preview"></div>
    </div>
    <div style="font-size:18px;font-weight:800">Jouw Avatar</div>
    <div id="pts-label" style="font-size:13px;color:#94a3b8;margin-top:2px">💰 0 punten beschikbaar</div>
  </div>

  <!-- Category tabs -->
  <div id="tabs" style="display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px"></div>

  <!-- Items grid -->
  <div id="items-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px"></div>

  <a href="index.html" style="display:block;width:100%;padding:13px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:12px;color:#e2e8f0;font-weight:600;font-size:14px;text-align:center;text-decoration:none">
    ← Terug naar overzicht
  </a>
</div>

<script src="shop-data.js"></script>
<script>
// SHOP, CAT_LABELS, DEFAULT_AVATAR, DEFAULT_OWNED → geladen via shop-data.js

let save={}, currentCat="body";

function loadSave(){
  try{save=JSON.parse(localStorage.getItem("beweging_save"))||{};}catch(e){save={};}
  if(!save.avatar) save.avatar={...DEFAULT_AVATAR};
  if(!save.owned)  save.owned=[...DEFAULT_OWNED];
  if(!save.pts)    save.pts=0;
}
function persist(){ try{localStorage.setItem("beweging_save",JSON.stringify(save));}catch(e){} }

function renderAvatar(){
  document.getElementById("avatar-preview").innerHTML = renderAvatarHTML(save.avatar, 90);
  document.getElementById("hdr-pts").textContent = save.pts;
  document.getElementById("pts-label").textContent = "💰 " + save.pts + " punten beschikbaar";
}

function renderTabs(){
  const el=document.getElementById("tabs");
  el.innerHTML=Object.entries(CAT_LABELS).map(([cat,label])=>`
    <button onclick="switchCat('${cat}')" style="flex-shrink:0;padding:7px 13px;border-radius:20px;border:1.5px solid ${currentCat===cat?"#60a5fa":"rgba(255,255,255,.1)"};background:${currentCat===cat?"rgba(96,165,250,.15)":"rgba(255,255,255,.04)"};color:${currentCat===cat?"#60a5fa":"#94a3b8"};font-weight:600;font-size:12px;cursor:pointer">
      ${label}
    </button>`).join("");
}

function renderItems(){
  const grid=document.getElementById("items-grid");
  grid.innerHTML=SHOP[currentCat].map(item=>{
    const isOwned=save.owned.includes(item.id);
    const isEquipped=save.avatar[currentCat]===item.id;
    const canAfford=save.pts>=item.price;
    const border=isEquipped?"#60a5fa":isOwned?"rgba(255,255,255,.18)":"rgba(255,255,255,.08)";
    const bg=isEquipped?"rgba(96,165,250,.15)":"rgba(255,255,255,.04)";
    const opacity=(!isOwned&&!canAfford)?.45:1;
    const cursor=(!isOwned&&!canAfford)?"not-allowed":"pointer";
    const visual=currentCat==="bg"
      ?`<div style="width:40px;height:40px;border-radius:50%;background:${item.color};margin:0 auto 8px;border:2px solid rgba(255,255,255,.15)"></div>`
      :`<div style="font-size:34px;margin-bottom:6px;line-height:1">${item.emoji||"−"}</div>`;
    const status=isEquipped
      ?`<span style="color:#60a5fa;font-weight:700">✓ Aan</span>`
      :isOwned
        ?`<span style="color:#34d399;font-size:11px">In bezit — klik om aan</span>`
        :`<span style="color:${canAfford?"#fbbf24":"#ef4444"};font-weight:600">💰 ${item.price} pts</span>`;
    return `
      <div class="card" onclick="handleItem('${currentCat}','${item.id}')"
        style="background:${bg};border:1.5px solid ${border};border-radius:14px;padding:14px 12px;cursor:${cursor};opacity:${opacity};text-align:center;position:relative">
        ${visual}
        <div style="font-weight:600;font-size:13px;color:#f1f5f9">${item.name}</div>
        <div style="margin-top:5px;font-size:12px">${status}</div>
        ${isEquipped?`<div style="position:absolute;top:8px;right:8px;width:10px;height:10px;border-radius:50%;background:#60a5fa"></div>`:""}
      </div>`;
  }).join("");
}

function handleItem(cat, id){
  const item=SHOP[cat].find(x=>x.id===id);
  if(!item) return;
  if(save.owned.includes(id)){
    save.avatar[cat]=id; persist(); renderAvatar(); renderItems();
  } else if(save.pts>=item.price){
    save.owned.push(id); save.pts-=item.price; save.avatar[cat]=id;
    persist(); renderAvatar(); renderItems();
  }
}

function switchCat(cat){ currentCat=cat; renderTabs(); renderItems(); }

loadSave(); renderAvatar(); renderTabs(); renderItems();
</script>
</body>
</html>
